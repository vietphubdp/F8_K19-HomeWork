<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Form đăng ký</title>
        <link rel="stylesheet" href="./css/form.css" />
    </head>
    <body>
        <input type="checkbox" name="open-menu" id="open-menu" />

        <label for="open-menu" class="open-menu">Tư vấn ngay</label>

        <label for="open-menu" class="overlay"></label>

        <div class="modal">
            <div class="modal-content">
                <h1 class="heading">Đăng ký tư vấn</h1>
                <p class="description">Điền thông tin để được tư vấn lộ trình học phù hợp</p>

                <form action="https://api-gateway.fullstack.edu.vn/action_page.php" method="post">
                    <div class="form-group">
                        <label class="label-form" for="fullname">
                            Họ và tên <span class="required-text">*</span>
                        </label>
                        <div class="field-wrap">
                            <input
                                type="text"
                                id="fullname"
                                name="fullname"
                                placeholder="Nguyễn Văn A"
                                required
                            />
                            <span class="tooltip">Nhập họ và tên đầy đủ của bạn</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="label-form" for="phone">
                            Số điện thoại <span class="required-text">*</span>
                        </label>
                        <div class="field-wrap">
                            <input
                                type="tel"
                                id="phone"
                                name="phone"
                                placeholder="0912345678"
                                required
                            />
                            <span class="tooltip">Số điện thoại để chúng tôi liên hệ tư vấn</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="label-form" for="email">Email</label>
                        <div class="field-wrap">
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="email@example.com"
                            />
                            <span class="tooltip">Email nhận thông tin khóa học</span>
                        </div>
                    </div>

                    <p class="description-course">
                        Khóa học quan tâm <span class="required-text">*</span>
                    </p>

                    <div class="checkbox-group">
                        <input
                            class="checkbox-input"
                            type="checkbox"
                            name="course"
                            id="course1"
                            value="HTML & CSS"
                        />
                        <label class="checkbox-label" for="course1">HTML & CSS</label>
                    </div>

                    <div class="checkbox-group">
                        <input
                            class="checkbox-input"
                            type="checkbox"
                            name="course"
                            id="course2"
                            value="Javascript"
                        />
                        <label class="checkbox-label" for="course2">Javascript</label>
                        <span class="tooltip">Ngôn ngữ lập trình cho web động</span>
                    </div>

                    <div class="checkbox-group">
                        <input
                            class="checkbox-input"
                            type="checkbox"
                            name="course"
                            id="course3"
                            value="Front-end lộ trình"
                        />
                        <label class="checkbox-label" for="course3">Front-end lộ trình</label>
                    </div>

                    <div class="checkbox-group">
                        <input
                            class="checkbox-input"
                            type="checkbox"
                            name="course"
                            id="course4"
                            value="ReactJS"
                        />
                        <label class="checkbox-label" for="course4">ReactJS</label>
                        <span class="tooltip">Thư viện JavaScript phổ biến nhất hiện nay</span>
                    </div>

                    <div class="checkbox-group">
                        <input
                            class="checkbox-input"
                            type="checkbox"
                            name="course"
                            id="course5"
                            value="Chưa rõ - cần tư vấn"
                        />
                        <label class="checkbox-label" for="course5">Chưa rõ - cần tư vấn</label>
                    </div>

                    <button class="btn-submit" type="submit">ĐĂNG KÝ TƯ VẤN NGAY</button>
                </form>
            </div>
        </div>
    </body>
</html>
