<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bai 1</title>
    </head>
    <style>
        body {
            background-color: #e9e6e6;
        }

        .hinh-vuong {
            width: 200px;
            height: 200px;
            background-color: transparent;
            border: red solid 5px;
            margin: 30px;
        }

        .hinh-chu-nhat {
            width: 300px;
            height: 150px;
            background-color: transparent;
            border: blue solid 5px;
            margin: 30px;
        }

        .tam-giac-len {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 180px solid green;
            margin: 30px;
        }

        .tam-giac-xuong {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-top: 180px solid orange;
            margin: 30px;
        }

        .tam-giac-trai {
            width: 0;
            height: 0;
            border-top: 100px solid transparent;
            border-bottom: 100px solid transparent;
            border-right: 180px solid purple;
            margin: 30px;
        }

        .tam-giac-phai {
            width: 0;
            height: 0;
            border-top: 120px solid transparent;
            border-bottom: 120px solid transparent;
            border-left: 180px solid pink;
            margin: 30px;
        }

        .hinh-thang {
            width: 150px;
            height: 0;
            border-bottom: 100px solid transparent;
            border-top: 100px solid transparent;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom-color: cyan;
            margin: 30px;
        }

        .tam-giac-can {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 150px solid cyan;
            margin: 30px;
        }

        .tam-giac-rong {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 50px solid magenta;
            margin: 30px;
        }

        .tam-giac-nhon {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 280px solid yellow;
            margin: 30px;
        }

        .mui-ten-phai {
            width: 0;
            height: 0;
            border-left: 100px solid green;
            border-right: 100px solid transparent;
            border-top: 50px solid transparent;
            border-bottom: 50px solid transparent;
            margin: 30px;
        }

        .mui-ten-trai {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid purple;
            border-top: 50px solid transparent;
            border-bottom: 50px solid transparent;
            margin: 30px;
        }

        .la-co {
            width: 200px;
            height: 0;
            border-left: 50px solid red;
            border-right: 50px solid transparent;
            border-bottom: 100px solid red;
            border-top: 100px solid red;
            margin: 30px;
        }

        .container {
            padding: 50px;
        }

        .chu-f,
        .chu-so-tam {
            display: inline-block;
            vertical-align: top;
        }

        .chu-f {
            width: 60px;
            height: 100px;
            border-left-style: solid;
            border-left-width: 20px;
            border-left-color: #d35441;
            border-top-style: solid;
            border-top-width: 20px;
            border-top-color: #d35441;
            margin-right: 15px;
        }

        .thanh-ngang-giua-f {
            width: 40px;
            height: 0;
            margin-top: 25px;
            border-top-style: solid;
            border-top-width: 20px;
            border-top-color: #d35441;
        }

        .tam-tren,
        .tam-duoi {
            width: 40px;
            height: 25px;
            border-style: solid;
            border-width: 20px;
            border-color: #d35441;
        }

        .tam-duoi {
            border-top-width: 0;
            height: 45px;
        }
    </style>
    <body>
        <div class="hinh-vuong"></div>
        <div class="hinh-chu-nhat"></div>
        <div class="tam-giac-len"></div>
        <div class="tam-giac-xuong"></div>
        <div class="tam-giac-trai"></div>
        <div class="tam-giac-phai"></div>
        <div class="hinh-thang"></div>
        <div class="tam-giac-rong"></div>
        <div class="tam-giac-nhon"></div>
        <div class="tam-giac-can"></div>
        <div class="mui-ten-phai"></div>
        <div class="mui-ten-trai"></div>
        <div class="la-co"></div>

        <div class="container">
            <div class="chu-f">
                <div class="thanh-ngang-giua-f"></div>
            </div>

            <div class="chu-so-tam">
                <div class="tam-tren"></div>
                <div class="tam-duoi"></div>
            </div>
        </div>
    </body>
</html>
