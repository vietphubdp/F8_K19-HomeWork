<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Modal</title>
        <style>
            /* RESET */
            * {
                box-sizing: border-box;
            }

            /* CSS nút mở */
            .open-btn {
                display: inline-block;
                padding: 10px 20px;
                cursor: pointer;
                color: #fff;
                background: #3b82f6;
            }

            /* CSS nút đóng modal */
            .close-btn {
                color: #fff;
                padding: 8px 16px;
                cursor: pointer;
                display: inline-block;
                background: #ef4444;
            }

            /* Lớp phủ */
            .overlay {
                margin-top: 50px;
                background: rgba(0, 0, 0, 0.5);
                padding: 120px 20px;
            }

            /* Modal CSS */
            .modal {
                background: #fff;
                width: 300px;
                height: 200px;
                margin: 0 auto;
                padding: 50px 38px;
            }

            /* Màu chữ trong modal */
            .modal p {
                color: #333;
            }

            /* Nút đóng modal */
            .close-btn {
                display: inline-block;
                background: #ef4444;
                color: #fff;
                padding: 8px 16px;
                cursor: pointer;
            }

            /* Ẩn checkbox và ẩn overlay */
            #modal-toggle,
            .overlay {
                display: none;
            }

            /* Hiện overlay và modal khi check */
            #modal-toggle:checked ~ .overlay {
                display: block;
            }
        </style>
    </head>
    <body>
        <input type="checkbox" name="modal-toggle" id="modal-toggle" />
        <label for="modal-toggle" class="open-btn">Mở modal</label>
        <label for="modal-toggle" class="overlay">
            <div class="modal">
                <p>Đây là nội dung thông báo</p>
                <label for="modal-toggle" class="close-btn">Đóng</label>
            </div>
        </label>
    </body>
</html>
