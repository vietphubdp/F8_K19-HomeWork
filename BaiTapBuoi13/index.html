<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Strips Hover Effect</title>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <main class="strips">
            <section class="strip strip-1">
                <h2 class="title">Relax</h2>
                <img
                    class="image"
                    src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=600&fit=crop"
                    alt="Relax"
                />
                <span class="overlay"></span>
            </section>

            <section class="strip strip-2">
                <h2 class="title">Explore</h2>
                <img
                    class="image"
                    src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&h=600&fit=crop"
                    alt="Explore"
                />
                <span class="overlay"></span>
            </section>

            <section class="strip strip-3">
                <h2 class="title">Travel</h2>
                <img
                    class="image"
                    src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=800&h=600&fit=crop"
                    alt="Travel"
                />
                <span class="overlay"></span>
            </section>

            <section class="strip strip-4">
                <h2 class="title">Achieve</h2>
                <img
                    class="image"
                    src="https://images.unsplash.com/photo-1484589065579-248aad0d8b13?w=800&h=600&fit=crop"
                    alt="Achieve"
                />
                <span class="overlay"></span>
            </section>

            <section class="strip strip-5">
                <h2 class="title">Dare</h2>
                <img
                    class="image"
                    src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop"
                    alt="Dare"
                />
                <span class="overlay"></span>
            </section>
        </main>
    </body>
</html>
