<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="../css/base.css" />
        <link rel="stylesheet" href="../css/theme.css" />
        <style>
            h1 {
                color: crimson;
            }
        </style>
    </head>
    <body>
        <!--
            Phan tu nay co: tag(h1) + class(.title) + id(#special) + inline style color
            Selector thang: color trong inline css cua H1 vì độ ưu tiên của inline css cao hơn những selector còn lại
            Mau hien thi: burlywood
        -->
        <h1 class="title" id="special" style="color: burlywood">DASHBOARD</h1>
        <h2 class="section">Tong quan he thong</h2>
        <div class="big">
            <h3 class="title">Courses</h3>
            <p class="highlight">Khoa 1</p>
            <h3 class="title">Students</h3>
            <p class="highlight">Khoa 2</p>
            <h3 class="title">Teachers</h3>
            <p class="highlight">Khoa 3</p>
            <h3 class="title">Orders</h3>
            <p class="highlight">Khoa 4</p>
            <h3 class="title">Reports</h3>
            <p class="highlight">Khoa 5</p>
        </div>
    </body>
</html>
