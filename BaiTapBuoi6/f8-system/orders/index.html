<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="../css/base.css" />
        <link rel="stylesheet" href="../css/theme.css" />
        <style>
            h2 {
                color: cadetblue;
            }
        </style>
    </head>
    <body>
        <h1 style="color: aquamarine">ORDERS PAGE</h1>
        <!-- CSS inline trong H2 ghi đè mọi CSS, CSS inline thắng -->
        <!--
            Phan tu nay co: tag(h2) + class(.title) + id(#special) + inline style
            Selector thang: css inline color
            Mau hien thi: red
        -->
        <h2 class="title" id="special" style="color: red">Danh sach don hang</h2>
        <p style="color: deeppink">Don hang 001</p>
        <p style="color: fuchsia">Don hang 002</p>
        <p class="highlight">Don hang 003</p>
        <p class="highlight">Don hang 004</p>
    </body>
</html>
