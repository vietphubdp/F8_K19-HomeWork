<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="../css/base.css" />
        <link rel="stylesheet" href="../css/theme.css" />
        <style>
            h1 {
                color: cornflowerblue;
            }
            .section {
                background-color: coral;
            }
            p.highlight {
                color: darkslategrey;
            }
        </style>
    </head>
    <body>
        <!--
            Phan tu nay co: tag(h1) + class(.title) + id(#special) + inline style color
            Selector thang: css inline color
            Mau hien thi: darkolivegreen
        -->
        <h1 class="title" id="special" style="color: darkolivegreen">COURSES PAGE</h1>
        <h2 class="title">Danh sach khoa hoc</h2>
        <div class="section">
            <p class="highlight">HTML co ban</p>
            <p class="highlight">CSS co ban</p>
            <p class="highlight">Javascript nang cao</p>
            <p class="highlight">ReactJS</p>
            <p class="highlight">NodeJS</p>
        </div>
    </body>
</html>
